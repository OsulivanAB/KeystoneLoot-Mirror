name: Build from Upstream (Wolkenschutz/KeystoneLoot)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: keystoneloot-sync
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mirror repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout upstream repository
        uses: actions/checkout@v4
        with:
          repository: Wolkenschutz/KeystoneLoot
          ref: main
          fetch-depth: 1
          path: upstream

      - name: Detect upstream changes
        id: check
        run: |
          set -euo pipefail

          UPSTREAM_SHA="$(git -C upstream rev-parse HEAD)"
          SHORT_SHA="${UPSTREAM_SHA:0:7}"
          VERSION_TAG="mirror-${UPSTREAM_SHA}"

          if git rev-parse -q --verify "refs/tags/${VERSION_TAG}" >/dev/null; then
            echo "No new upstream changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream revision detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure Git identity
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build addon zip for WowUp
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail

          ADDON_NAME="KeystoneLoot"

          rm -rf dist
          mkdir -p "dist/${ADDON_NAME}"

          rsync -av \
            --exclude '.git' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'dist/' \
            upstream/ "dist/${ADDON_NAME}/"

          (
            cd dist
            zip -r "${ADDON_NAME}.zip" "${ADDON_NAME}"
          )

          echo "${{ steps.check.outputs.version_tag }}" > dist/version.txt

      - name: Create GitHub release and upload zip
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION_TAG="$(cat dist/version.txt)"
          ADDON_NAME="KeystoneLoot"

          git tag "${VERSION_TAG}"
          git push origin "${VERSION_TAG}"

          gh release create "${VERSION_TAG}" \
            "dist/${ADDON_NAME}.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --target main \
            --title "${VERSION_TAG}" \
            --notes "Automated mirror release from Wolkenschutz/KeystoneLoot @ ${{ steps.check.outputs.short_sha }}"
